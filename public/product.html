<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - DigiKarya</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Digi<span>Karya.</span></a>
    </div>
  </nav>

  <main class="container">
    <div class="checkout-box">
      <h1 id="detail-title">Memuat produk...</h1>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Akses seumur hidup. Modul diupdate berkala.</p>
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <span style="font-weight: 500;">Total Pembayaran</span>
        <span id="detail-price" style="font-size: 2rem; font-weight: 800; color: var(--primary);">Rp 0</span>
      </div>

      <form id="checkout-form">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="customer-name" required placeholder="Contoh: Budi Santoso">
        </div>
        <div class="form-group">
          <label>Alamat Email</label>
          <input type="email" id="customer-email" required placeholder="budi@email.com">
        </div>
        <div class="form-group">
          <label>Nomor WhatsApp (Wajib)</label>
          <input type="tel" id="customer-mobile" required placeholder="081234567890">
        </div>
        
        <button type="submit" class="btn btn-primary" id="btn-submit" style="margin-top: 1rem; padding: 1rem;">
          Bayar Sekarang
        </button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
